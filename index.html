<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INVENTORY COUNTING SYSTEM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body {
  font-family: Arial;
  background: #f4f6f9;
  margin: 0;
  padding: 20px;
  color: #111;
}

.container {
  max-width: 1200px;
  margin: auto;
  background: #fff;
  padding: 24px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.scan-row {
  display: flex;
  gap: 15px;
}

input, select {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.btn-blue { background:#2563eb; color:#fff; }
.btn-red { background:#dc2626; color:#fff; }

.table-container {
  max-height: 420px;
  overflow-y: auto;
  margin-top: 15px;
  border: 1px solid #ddd;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #e5e7eb;
  padding: 8px;
  font-size: 13px;
}

th {
  background: #f1f5f9;
  position: sticky;
  top: 0;
}

.del-btn {
  background: #ef4444;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
}

.box {
  background: #f8fafc;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.latest {
  background: #fff7cc;
}

</style>

</head>

<body>

<div class="container">

<h2>📦 INVENTORY COUNT SYSTEM</h2>

<div class="scan-row">

  <select id="rowSelect"></select>
  <input id="qrInput" placeholder="Scan QR..." autofocus />

</div>

<br>

<button class="btn-blue" onclick="exportExcel()">Export Excel</button>
<button class="btn-red" onclick="clearAll()">Clear</button>

<div class="table-container">
<table>
<thead>
<tr>
  <th>Row</th>
  <th>No</th>
  <th>Line</th>
  <th>Location</th>
  <th>Part</th>
  <th>Qty</th>
  <th>PO</th>
  <th>LOT</th>
  <th>Remark</th>
  <th>Time</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

<div id="summary"></div>

</div>

<script>

let data = [];
let scanned = [];

const tb = document.getElementById("tb");
const qr = document.getElementById("qrInput");
const rowSelect = document.getElementById("rowSelect");

for(let i=1;i<=20;i++){
  rowSelect.innerHTML += `<option value="${i}">Row ${i}</option>`;
}

/* SCAN */
qr.addEventListener("keypress",e=>{
  if(e.key==="Enter"){
    scan(qr.value);
    qr.value="";
  }
});

function scan(v){

  if(scanned.includes(v)) return;

  scanned.push(v);

  const d = v.split("|");

  const row = rowSelect.value;
  const line = d[1]||"-";
  const location = d[2]||"-";
  const part = d[4]||"-";
  const qty = parseInt(d[5])||0;
  const po = d[7]||"-";
  const lot = d[8]||"-";
  const time = new Date().toLocaleString();

  /* REMARK CHECK */
  let duplicateRows = [];

  data.forEach(item=>{
    if(item.part===part && item.row!==row){
      if(!duplicateRows.includes(item.row)){
        duplicateRows.push(item.row);
      }
    }
  });

  let remark = "";

  if(duplicateRows.length>0){
    remark = "ข้อมูล Part item ซ้ำกับแถว " + duplicateRows.join(", ");
  }

  data.push({
    row,line,location,part,qty,po,lot,remark,time,key:v
  });

  render();
  qr.focus();
}

/* RENDER TABLE */
function render(){

  tb.innerHTML="";

  data.forEach((x,i)=>{

    tb.innerHTML += `
      <tr class="${i===data.length-1?'latest':''}">
        <td>${x.row}</td>
        <td>${i+1}</td>
        <td>${x.line}</td>
        <td>${x.location}</td>
        <td>${x.part}</td>
        <td>${x.qty}</td>
        <td>${x.po}</td>
        <td>${x.lot}</td>
        <td>${x.remark}</td>
        <td>${x.time}</td>
        <td><button class="del-btn" onclick="del(${i})">Delete</button></td>
      </tr>
    `;

  });

  document.querySelector(".table-container").scrollTop =
  document.querySelector(".table-container").scrollHeight;

  renderSummary();
}

/* DELETE */
function del(i){
  scanned = scanned.filter(x=>x!==data[i].key);
  data.splice(i,1);
  render();
}

/* SUMMARY */
function renderSummary(){

  let s={};

  data.forEach(x=>{
    if(!s[x.row]) s[x.row]={};
    if(!s[x.row][x.part]) s[x.row][x.part]={c:0,q:x.qty};
    s[x.row][x.part].c++;
  });

  let html="";

  Object.keys(s).forEach(r=>{

    let unit=0, qty=0;

    html+=`<div class="box"><h3>Row ${r}</h3>`;

    Object.keys(s[r]).forEach(p=>{

      let c=s[r][p].c;
      let q=s[r][p].q;
      let total=c*q;

      unit+=c;
      qty+=total;

      html+=`${p} = ${c} × ${q} = ${total} pcs<br>`;
    });

    html+=`<hr><b>Total Unit:</b> ${unit}<br><b>Total Qty:</b> ${qty} pcs</div>`;
  });

  document.getElementById("summary").innerHTML=html;
}

/* CLEAR */
function clearAll(){
  data=[];
  scanned=[];
  tb.innerHTML="";
  summary.innerHTML="";
}

/* =========================
   EXPORT EXCEL (FIXED)
   ========================= */
function exportExcel(){

  /* RAW */
  let ws1 = XLSX.utils.json_to_sheet(data);

  /* SUMMARY BUILD (same logic as dashboard) */
  let s={};

  data.forEach(x=>{
    if(!s[x.row]) s[x.row]={};
    if(!s[x.row][x.part]) s[x.row][x.part]={c:0,q:x.qty};
    s[x.row][x.part].c++;
  });

  let summarySheet=[];

  Object.keys(s).forEach(r=>{
    Object.keys(s[r]).forEach(p=>{
      summarySheet.push({
        Row:r,
        Part:p,
        Unit:s[r][p].c,
        Qty:s[r][p].c * s[r][p].q
      });
    });
  });

  let ws2 = XLSX.utils.json_to_sheet(summarySheet);

  /* WORKBOOK */
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws1, "RawData");
  XLSX.utils.book_append_sheet(wb, ws2, "Summary");

  XLSX.writeFile(wb, "inventory_report.xlsx");
}

</script>

</body>
</html>
