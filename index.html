<script>

  const qrInput = document.getElementById('qrInput');
  const tableBody = document.querySelector('#dataTable tbody');
  const rowSelect = document.getElementById('rowSelect');
  const duplicateAlert = document.getElementById('duplicateAlert');
  const tableContainer = document.getElementById('tableContainer');

  let rowCount = 0;
  let scanDataList = [];
  let scannedItems = [];

  for (let i = 1; i <= 20; i++) {

    const option = document.createElement('option');

    option.value = i;
    option.text = 'Row ' + i;

    rowSelect.appendChild(option);

  }

  qrInput.addEventListener('keypress', function(event) {

    if (event.key === 'Enter') {

      const value = qrInput.value.trim();

      if (value !== '') {

        parseQRCode(value);

        qrInput.value = '';

      }

    }

  });

  function parseQRCode(text) {

    duplicateAlert.style.display = 'none';

    const data = text.split('|');

    const line = data[1] || '-';
    const location = data[2] || '-';
    const part = data[4] || '-';
    const qty = data[5] || '-';
    const po = data[7] || '-';
    const lot = data[8] || '-';

    const itemKey = text.trim();

    // ตรวจสอบข้อมูลซ้ำทั้ง QR
    if (scannedItems.includes(itemKey)) {

      duplicateAlert.style.display = 'block';

      document.getElementById('status').innerText =
        'Duplicate Item';

      qrInput.focus();

      return;

    }

    scannedItems.push(itemKey);

    rowCount++;

    const selectedRow = rowSelect.value;

    const scanTime = new Date().toLocaleString();

    // ตรวจสอบ Part Item ซ้ำต่างแถว
    let duplicateRows = [];

    scanDataList.forEach(item => {

      if (
        item.PartItem === part &&
        item.Row != selectedRow &&
        !duplicateRows.includes(item.Row)
      ) {

        duplicateRows.push(item.Row);

      }

    });

    let remark = '';

    if (duplicateRows.length > 0) {

      remark =
        'ข้อมูล Part item ซ้ำกับแถวที่ ' +
        duplicateRows.join(', ');

    }

    // ลบ highlight เก่า
    document.querySelectorAll('.latest-row').forEach(row => {
      row.classList.remove('latest-row');
    });

    // เพิ่มข้อมูลลงตาราง
    const row = `
      <tr class="latest-row" data-key="${itemKey}">

        <td>
          <button
            class="delete-btn"
            onclick="deleteRow('${itemKey}', this)"
          >
            Delete
          </button>
        </td>

        <td>${selectedRow}</td>
        <td>${rowCount}</td>
        <td>${line}</td>
        <td class="location-column">${location}</td>
        <td class="part-column">${part}</td>
        <td>${qty}</td>
        <td>${po}</td>
        <td>${lot}</td>
        <td>${scanTime}</td>
        <td>${remark}</td>

      </tr>
    `;

    tableBody.insertAdjacentHTML('beforeend', row);

    // Scroll ไปแถวล่าสุด
    const latestRow = tableBody.lastElementChild;

    latestRow.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });

    // เก็บข้อมูล
    scanDataList.push({

      Row: selectedRow,
      No: rowCount,
      Line: line,
      Location: location,
      PartItem: part,
      Quantity: qty,
      PO: po,
      LOTNO: lot,
      ScanTime: scanTime,
      Remark: remark,
      itemKey: itemKey

    });

    document.getElementById('status').innerText =
      'Scan Success';

    qrInput.focus();

  }

  function exportExcel() {

    if (scanDataList.length === 0) {

      alert('No data to export');

      return;

    }

    const detailWorksheet =
      XLSX.utils.json_to_sheet(scanDataList);

    const summaryMap = {};

    scanDataList.forEach(item => {

      if (!summaryMap[item.PartItem]) {

        summaryMap[item.PartItem] = {

          PartItem: item.PartItem,
          TotalQty: 0,
          Rows: []

        };

      }

      summaryMap[item.PartItem].TotalQty +=
        Number(item.Quantity) || 0;

      if (!summaryMap[item.PartItem].Rows.includes(item.Row)) {

        summaryMap[item.PartItem].Rows.push(item.Row);

      }

    });

    const summaryData =
      Object.values(summaryMap).map(item => ({

        PartItem: item.PartItem,
        TotalQuantity: item.TotalQty,
        Rows: item.Rows.join(', ')

      }));

    const summaryWorksheet =
      XLSX.utils.json_to_sheet(summaryData);

    const workbook = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
      workbook,
      detailWorksheet,
      'QR Data'
    );

    XLSX.utils.book_append_sheet(
      workbook,
      summaryWorksheet,
      'Summary'
    );

    const today = new Date();

    const fileName =
      today.getFullYear() +
      '-' +
      String(today.getMonth() + 1).padStart(2, '0') +
      '-' +
      String(today.getDate()).padStart(2, '0') +
      '.xlsx';

    XLSX.writeFile(workbook, fileName);

  }

  function deleteRow(itemKey, button) {

    const row = button.closest('tr');

    row.remove();

    scanDataList =
      scanDataList.filter(item => item.itemKey !== itemKey);

    scannedItems =
      scannedItems.filter(item => item !== itemKey);

    document.getElementById('status').innerText =
      'Row Deleted';

  }

  function clearTable() {

    tableBody.innerHTML = '';

    scanDataList = [];
    scannedItems = [];
    rowCount = 0;

    duplicateAlert.style.display = 'none';

    document.getElementById('status').innerText =
      'Data Cleared';

    qrInput.focus();

  }

  qrInput.focus();

</script>
